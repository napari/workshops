version: 1
project:
  title: napari workshops
  authors:
    - name: napari core team
  github: napari/workshops
  thebe:
    binder:
      repo: napari/workshops
      provider: github
      url: https://mybinder.org
      ref: main
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/napari_workshop.pdf
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        # GH is rather flaky for CI right now, temporary measure
        # https://github.com/jupyter-book/mystmd/issues/2122#issuecomment-4042718629
         - 'https://github.com/**'
         - 'https://forum.image.sc/**'
  toc:
    - file: home.md
      title: Home
    - title: Introduction to napari
      children:
        - file: 01-intro-napari/index.md
        - file: 01-intro-napari/00_setup.md
        # - file: 01-intro-napari/01_napari_gui.md
        # - file: 01-intro-napari/02_intro_bioimage_viz.md
        # - file: 01-intro-napari/03_manual_annotation.md
        # - file: 01-intro-napari/04_interactive_analysis.md
        # - file: 01-intro-napari/05_using_plugins.md
    - file: schedule.md
site:
  options:
    favicon: resources/logo.ico
    logo: resources/napari-logo.png
    folders: true
    # Generated by `pixi run copy-css` from napari-sphinx-theme + resources/_custom.css
    style: resources/napari-theme.css
  template: book-theme
  title: napari workshops
