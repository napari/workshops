# Workflow for building and deploying the napari workshops to GitHub Pages
name: Build and Deploy Site

on:
  # Runs on pushes targeting the default branch
  pull_request:
  push:
    branches: ["main"]
  schedule:
    # Every Tuesday at 12:00 UTC
    - cron: '0 12 * * 2'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # Since your site lives at `https://{user/org}.github.io/workshops`, set `BASE_URL=/workshops`.
  BASE_URL: /${{ github.event.repository.name }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job for PRs and main
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          locked: false  # solve fresh each run
      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3
        with:
          qt: true
          wm: herbstluftwm
      - name: Configure herbstluftwm
        # Float napari windows outside the tiling grid so parallel notebook
        # execution doesn't cause herbstluftwm to re-tile and shrink them.
        run: herbstclient rule title=napari floating=on
      - name: Build workshop
        run: pixi run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: './docs/_build/html'

  # Deploy job - only runs on main and not on schedule
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
