version: 1
project:
  title: napari workshops
  authors:
    - name: napari core team
  github: https://github.com/napari/workshops
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        # GH is rather flaky for CI right now, temporary measure
        # https://github.com/jupyter-book/mystmd/issues/2122#issuecomment-4042718629
         - 'https://github.com/**'
         - 'https://forum.image.sc/**'
         # [image.sc] auto-links as http://image.sc (bare domain) and returns 403
         - 'http*://image.sc*'
         - 'http*://ti.to*'
         - 'https://ti.to/**'
  toc:
    - file: home.md
      title: Home
    - title: Introduction to napari
      children:
        - file: 01-intro-napari/index.md
        - file: 01-intro-napari/setup.md
        - file: 01-intro-napari/block1_welcome.md
        - file: 01-intro-napari/block2_gui.md
        - file: 01-intro-napari/block3_plugins_and_annotation.md
        - file: 01-intro-napari/block4_analysis_wrap_up.md
    - file: events.md
    - title: Instructors
      children:
        - file: 00-instructors/organizers.md
        - file: 00-instructors/instructors.md
  # thebe:
  #   binder:
  #     repo: napari/workshops
  #     provider: github
  #     url: https://mybinder.org
  #     ref: main
  # exports:
  #   - format: pdf
  #     template: plain_latex_book
  #     output: exports/napari_workshop.pdf
site:
  options:
    favicon: _resources/silhouette-theme-aware.svg
    logo: _resources/napari-logo-light.svg
    logo_dark: _resources/napari-logo-dark.svg
    folders: true
    # Generated by `pixi run copy-css` from napari-sphinx-theme + _resources/_custom.css
    style: _resources/napari-theme.css
  template: book-theme
  title: napari workshops
